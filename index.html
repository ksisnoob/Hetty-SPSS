<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060a12">
<title>SPSS Exam Trainer v5.6 Eye Comfort</title>
<style>
:root{
  color-scheme:dark;
  --bg:#060a12;--panel:#0c1422;--panel2:#111d30;--panel3:#17253c;
  --text:#f3f6fb;--muted:#a9b6ca;--line:#2b3b55;
  --accent:#7898ff;--accent2:#496fe8;--good:#46d69a;--warn:#e9bd58;--bad:#ff7182;

  /* Default: dim paper — lower contrast than pure white/black */
  --spss-bg:#d8d1c4;
  --spss-title:#bfb5a5;
  --spss-head:#c9c0b2;
  --spss-label:#d0c8bc;
  --spss-text:#24211d;
  --spss-border:#625c53;
}
body[data-table-theme="cool"]{
  --spss-bg:#c5cdd2;
  --spss-title:#aeb8bf;
  --spss-head:#b8c1c7;
  --spss-label:#c0c8cd;
  --spss-text:#182026;
  --spss-border:#53606a;
}
body[data-table-theme="dark"]{
  --spss-bg:#202733;
  --spss-title:#303a49;
  --spss-head:#2a3442;
  --spss-label:#252e3b;
  --spss-text:#e7edf4;
  --spss-border:#58677b;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.42}
button,textarea,select{font:inherit}
button{border:0;border-radius:11px;min-height:42px;padding:9px 13px;font-weight:850;cursor:pointer;touch-action:manipulation}
button:disabled{opacity:.36;cursor:not-allowed}
button.primary{background:linear-gradient(135deg,var(--accent2),#6f8df7);color:#fff}
button.secondary{background:var(--panel3);color:var(--text);border:1px solid var(--line)}
button.ghost{background:transparent;color:var(--muted)}
button:focus-visible,.cell:focus-visible,textarea:focus-visible,select:focus-visible{outline:3px solid rgba(120,152,255,.55);outline-offset:2px}
.app{width:100%;min-width:0;height:100vh;height:100dvh;display:grid;grid-template-columns:minmax(0,1fr);grid-template-rows:52px minmax(0,1fr) 58px}
.topbar{min-width:0;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 12px;border-bottom:1px solid var(--line);background:#080d17}
.brand{min-width:0}.brand strong{display:block;font-size:14px}.brand small{display:block;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.version{flex:0 0 auto;min-height:30px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:var(--accent);background:var(--panel2);font-size:10px;font-weight:900}
.viewport{min-width:0;width:100%;min-height:0;padding:7px;overflow:hidden}
.screen{height:100%;max-width:1040px;margin:auto}
.card{height:100%;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,var(--panel),#09111e);overflow:hidden}
.head{padding:10px 12px 8px;border-bottom:1px solid var(--line)}
.head h1,.head h2{margin:3px 0 0;line-height:1.12}.head h1{font-size:clamp(21px,4vw,32px)}.head h2{font-size:clamp(18px,3vw,25px)}
.eyebrow{color:var(--accent);font-size:10px;font-weight:950;letter-spacing:.08em;text-transform:uppercase}
.body{min-height:0;overflow:auto;padding:9px 11px;overscroll-behavior:contain}
.foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 9px;border-top:1px solid var(--line);background:#080f1b}
.bottomnav{min-width:0;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px 7px calc(5px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#070c15}
.navbtn{min-width:0;min-height:45px;padding:4px 2px;background:transparent;color:var(--muted);font-size:10px}
.navbtn b{display:block;font-size:17px;line-height:1}.navbtn.active{background:var(--panel2);color:var(--accent)}
.hero{min-height:100%;display:grid;align-content:center;gap:10px;max-width:760px;margin:auto}
.hero p{margin:0;color:var(--muted)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat{padding:9px;border:1px solid var(--line);border-radius:11px;background:var(--panel2)}
.stat strong{display:block}.stat span{display:block;color:var(--muted);font-size:11px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.formula{padding:9px;border:1px solid var(--line);border-radius:11px;background:#070d17;color:#dce5f4;font-size:12px}
.stages{display:flex;gap:5px;overflow:auto;scrollbar-width:none;margin-bottom:7px}.stages::-webkit-scrollbar{display:none}
.stage{flex:0 0 auto;padding:6px 9px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:10px;font-weight:850}
.stage.current{color:var(--accent);border-color:var(--accent2)}.stage.done{color:var(--good)}
select{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--text);padding:8px;margin-bottom:7px}
.prompt{padding:8px 10px;border-left:4px solid var(--accent2);border-radius:9px;background:var(--panel2);font-size:12px;margin:7px 0}
.context{display:inline-block;color:var(--warn);font-size:11px;font-weight:850;margin:2px 0 4px}
.output-shell{
  max-width:820px;
  max-height:min(38vh,330px);
  overflow:auto;
  margin:7px auto;
  border:1.5px solid var(--spss-border);
  border-radius:9px;
  background:var(--spss-bg);
  box-shadow:0 10px 26px rgba(0,0,0,.24);
}
.output-title{
  text-align:center;
  padding:7px;
  background:var(--spss-title);
  color:var(--spss-text);
  border-bottom:1.5px solid var(--spss-border);
  font:800 clamp(13px,2vw,17px) Arial,Helvetica,sans-serif;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font:clamp(9px,1.55vw,13px) Arial,Helvetica,sans-serif;
  color:var(--spss-text);
  background:var(--spss-bg);
}
th,td{
  border:1px solid var(--spss-border);
  padding:clamp(5px,.8vw,8px);
  text-align:center;
  overflow-wrap:anywhere;
  background:var(--spss-bg);
  color:var(--spss-text);
}
th{
  background:var(--spss-head);
  color:var(--spss-text);
  font-weight:700;
}
td:first-child,.label{
  background:var(--spss-label);
  color:var(--spss-text);
  text-align:left;
}
.cell{cursor:pointer;user-select:none;transition:.12s}.cell:hover{background:#e8eefc!important}
.cell.selected{background:#fff0a6!important;color:#000!important;box-shadow:inset 0 0 0 3px #8a6500}
.cell.correct{background:#c8f3d8!important;color:#000!important;box-shadow:inset 0 0 0 3px #137a45}
.cell.wrong{background:#ffd1d6!important;color:#000!important;box-shadow:inset 0 0 0 3px #b42318}
.scree{position:relative;max-width:720px;max-height:min(38vh,330px);margin:7px auto;border:1.5px solid var(--spss-border);border-radius:9px;background:var(--spss-bg);padding:5px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.24)}
.scree svg{display:block;width:100%;max-height:31vh}
.spss-svg-bg{fill:var(--spss-bg)}
.spss-svg-axis{stroke:var(--spss-text)}
.spss-svg-text{fill:var(--spss-text)}
.hotspot{position:absolute;left:34%;top:48%;width:13%;height:23%;border:2px dashed transparent;border-radius:50%;background:transparent;cursor:pointer}
.hotspot.selected{border-color:#a8872e;background:rgba(168,135,46,.22)}.hotspot.correct{border-color:#2a9f71;background:rgba(42,159,113,.24)}
.options{display:grid;gap:6px;margin-top:7px}
.option{width:100%;min-height:40px;text-align:left;background:var(--panel2);color:var(--text);border:1px solid var(--line);font-weight:700}
.option.correct{border-color:var(--good);background:rgba(70,214,154,.11)}.option.wrong{border-color:var(--bad);background:rgba(255,113,130,.1)}
.feedback{margin-top:7px;padding:8px 9px;border-radius:9px;font-size:12px;font-weight:750}
.feedback.good{color:var(--good);border:1px solid rgba(70,214,154,.3);background:rgba(70,214,154,.09)}
.feedback.bad{color:#ffc0c8;border:1px solid rgba(255,113,130,.32);background:rgba(255,113,130,.09)}
.explain-list{display:grid;gap:5px;margin-top:7px}.explain{padding:7px 8px;border-radius:8px;background:var(--panel2);color:var(--muted);font-size:11px}.explain strong{color:var(--text)}
textarea{width:100%;min-height:105px;resize:none;border:1px solid var(--line);border-radius:10px;background:#070d17;color:var(--text);padding:9px}
.counter{color:var(--muted);font-size:10px;text-align:right;margin-top:3px}
.keywords{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}.keyword{padding:3px 6px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:9px}.keyword.hit{color:var(--good);border-color:rgba(70,214,154,.4)}
.progress{height:7px;background:var(--panel3);border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--good))}
.hidden{display:none!important}
@media(max-height:720px){
  .app{grid-template-rows:48px minmax(0,1fr) 54px}.viewport{padding:5px}
  .head{padding:7px 9px 6px}.body{padding:6px 9px}.foot{padding:6px 7px}
  .output-shell,.scree{max-height:34vh;margin:5px auto}.prompt{margin:5px 0;padding:6px 8px}
  .options{gap:4px;margin-top:5px}.option{min-height:36px;padding:7px 9px}
}
@media(min-width:768px){
  .viewport{padding:10px}.head{padding:12px 16px 9px}.body{padding:10px 16px}.foot{padding:9px 14px}
  .stats{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<header class="topbar">

eliability."},"items":{"label":"N of Items 12","reason":"Ini hanya bilangan item, bukan tahap reliability."}}},{"id":"itemtotal","short":"Item-Total","title":"Item-Total Statistics","question":"Apakah kegunaan utama jadual ini?","identifyOptions":["Mengenal pasti item yang berpotensi bermasalah.","Menentukan bilangan faktor sahaja.","Menentukan tahap KMO."],"identifyAnswer":0,"task":"Alpha asal ialah .853. Tekan dua nilai yang menunjukkan A5 perlu diberi perhatian.","requiredCells":["a5corr","a5del"],"scanGuide":["Cari Corrected Item-Total Correlation yang rendah.","Bandingkan Alpha if Item Deleted dengan alpha asal.","Jangan buang item secara automatik tanpa melihat kandungan dan teori."],"openings":["Berdasarkan jadual Item-Total Statistics, A5 mempunyai Corrected Item-Total Correlation paling rendah, iaitu .254.","Berdasarkan jadual Reliability Statistics, KMO A5 ialah .254.","A5 mesti dibuang kerana nombornya paling kecil."],"openingAnswer":0,"keywords":["a5",".254",".882","semak"],"model":"Berdasarkan jadual Item-Total Statistics, A5 mempunyai Corrected Item-Total Correlation paling rendah, iaitu .254. Alpha meningkat daripada .853 kepada .882 jika A5 dibuang. Oleh itu, A5 perlu disemak dan boleh dipertimbangkan untuk digugurkan berdasarkan kandungan dan teori.","context":"Alpha asal = .853","output":{"type":"table","caption":"Item-Total Statistics","headers":["Item","Corrected Item-Total Correlation","Cronbach’s Alpha if Item Deleted"],"rows":[[{"text":"A1"},{"id":"a1corr","text":".612"},{"id":"a1del","text":".841"}],[{"text":"A5"},{"id":"a5corr","text":".254"},{"id":"a5del","text":".882"}],[{"text":"A6"},{"id":"a6corr","text":".687"},{"id":"a6del","text":".839"}]]},"identifyReasons":["Betul kerana Item-Total Statistics membandingkan prestasi setiap item dengan skor keseluruhan dan perubahan alpha jika item dibuang.","Salah kerana bilangan faktor ditentukan melalui Total Variance Explained dan Scree Plot.","Salah kerana KMO berada dalam jadual KMO and Bartlett’s Test."],"openingReasons":["Betul: ayat mengenal pasti item, kolum penting dan nilai sebenar.","Salah kerana jadual ini ialah Item-Total Statistics, bukannya Reliability Statistics, dan .254 bukan nilai KMO.","Salah kerana item tidak boleh dibuang hanya kerana satu nilai kecil; alpha if deleted, kandungan dan teori juga perlu dipertimbangkan."],"cellInfo":{"a1corr":{"label":"A1 correlation .612","reason":"Nilai ini memadai dan bukan yang paling rendah."},"a1del":{"label":"A1 alpha if deleted .841","reason":"Alpha menurun daripada .853, jadi A1 bukan calon utama."},"a5corr":{"label":"A5 correlation .254","reason":"Nilai ini rendah dan menunjukkan A5 kurang selari dengan skor keseluruhan."},"a5del":{"label":"A5 alpha if deleted .882","reason":"Alpha meningkat daripada .853 kepada .882 jika A5 dibuang."},"a6corr":{"label":"A6 correlation .687","reason":"Nilai ini baik dan bukan yang paling rendah."},"a6del":{"label":"A6 alpha if deleted .839","reason":"Alpha menurun, jadi A6 bukan calon utama."}}},{"id":"kmo","short":"KMO/Bartlett","title":"KMO and Bartlett’s Test","question":"Apakah keputusan utama yang hendak dibuat daripada jadual ini?","identifyOptions":["Sama ada data sesuai untuk factor analysis.","Sama ada instrumen reliabel.","Item masuk ke faktor yang mana."],"identifyAnswer":0,"task":"Tekan dua nilai utama untuk menentukan kesesuaian factor analysis.","requiredCells":["kmo","sig"],"scanGuide":["KMO menilai kecukupan data.","Sig. Bartlett mesti kurang daripada .05.","Sig. .000 dalam SPSS dilaporkan sebagai p < .001, bukan p = 0."],"openings":["Berdasarkan jadual KMO and Bartlett’s Test, nilai KMO ialah .824 dan Bartlett’s Test adalah signifikan, p < .001.","Berdasarkan jadual Reliability, nilai p ialah kosong.","Chi-square mesti dihuraikan dahulu sebelum KMO."],"openingAnswer":0,"keywords":[".824","p < .001","sesuai","factor analysis"],"model":"Berdasarkan jadual KMO and Bartlett’s Test, nilai KMO ialah .824 dan Bartlett’s Test adalah signifikan, p < .001. N function clone(v){return JSON.parse(JSON.stringify(v))}
function load(){try{return {...clone(DEFAULT),...JSON.parse(localStorage.getItem("spss-v5-fixed")||"{}")}}catch(e){return clone(DEFAULT)}}
let state=load();
const screen=document.getElementById("screen");
function save(){try{localStorage.setItem("spss-v5-fixed",JSON.stringify(state))}catch(e){}}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function setRoute(route){state.route=route;save();render()}
function resetStage(){state.stage=0;state.choice=null;state.selected=[];state.evaluated=false;state.written="";state.writtenChecked=false}
function card(head,body,foot){return `<article class="card"><header class="head">${head}</header><div class="body">${body}</div><footer class="foot">${foot}</footer></article>`}
function renderOutput(out,interactive=false){
 if(out.type==="scree"){
  const selected=state.selected.includes("elbow");
  return `<div class="scree"><div class="output-title">${esc(out.caption)}</div>
  <svg viewBox="0 0 620 300" aria-label="Scree Plot">

   <g class="spss-svg-text" font-family="Arial" font-size="12"><text x="101" y="270">1</text><text x="171" y="270">2</text><text x="241" y="270">3</text><text x="311" y="270">4</text><text x="381" y="270">5</text><text x="451" y="270">6</text><text x="521" y="270">7</text></g>
  </svg>${interactive?`<button class="hotspot cell ${selected?"selected":""}" data-cell="elbow" aria-label="Pilih elbow"></button>`:""}</div>`;
 }

  return `<div class="output-shell"><div class="output-title">${esc(out.caption)}</div><table><tbody>${out.rows.map(r=>{

 }

}
function cellClass(id){
 if(!state.selected.includes(id)&&!state.evaluated)return "";
 const lesson=DATA.lessons[state.lesson];
 if(state.evaluated){
  if(lesson.requiredCells.includes(id))return "correct";
  if(state.selected.includes(id))return "wrong";
 }
 return state.selected.includes(id)?"selected":"";
}
function stages(){return `<div class="stages">${["Kenal","Scan","Ayat","Jawab"].map((x,i)=>`<span class="stage ${i===state.stage?"current":""} ${i<state.stage?"done":""}">${i+1}. ${x}</span>`).join("")}</div>`}

function detailedSelectionFeedback(lesson){
 const selected=new Set(state.selected),required=new Set(lesson.requiredCells);
 const lines=[];
 [...selected].forEach(id=>{
  const info=lesson.cellInfo[id];
  if(info)lines.push(`<div class="explain"><strong>${required.has(id)?"✓ Betul dipilih":"✗ Salah dipilih"} — ${esc(info.label)}</strong><br>${esc(info.reason)}</div>`);
 });
 [...required].filter(id=>!selected.has(id)).forEach(id=>{
  const info=lesson.cellInfo[id];
  if(info)lines.push(`<div class="explain"><strong>＋ Tertinggal — ${esc(info.label)}</strong><br>${esc(info.reason)}</div>`);
 });
 return lines.join("");
}

  foot=`<button class="secondary" data-action="prev-stage">← Kembali</button>${state.evaluated?nextButton("Ayat",true):`<button class="primary" data-action="check-scan" ${state.selected.length?"":"disabled"}>Semak pilihan</button>`}`;
 }else if(state.stage===2){
  body+=`<div class="prompt"><strong>Pilih ayat pembukaan yang tepat.</strong><br><span style="color:var(--muted)">Nama jadual → statistik → nilai.</span></div>${renderOutput(l.output)}
  <div class="options">${l.openings.map((o,i)=>`<button class="option ${state.choice===i?(i===l.openingAnswer?"correct":"wrong"):""} ${state.choice!==null&&i===l.openingAnswer?"correct":""}" data-action="opening" data-index="${i}" ${state.choice!==null?"disabled":""}>${esc(o)}</button>`).join("")}</div>
  ${state.choice!==null?`<div class="feedback ${state.choice===l.openingAnswer?"good":"bad"}">${esc(l.openingReasons[state.choice])}</div>`:""}`;
  foot=`<button class="secondary" data-action="prev-stage">← Kembali</button>${nextButton("Jawab sendiri",state.choice!==null)}`;
 }else{
  const valid=state.written.trim().length>=MIN_WRITTEN;
  body+=`<div class="prompt"><strong>Tulis interpretasi lengkap tanpa melihat model.</strong></div>${renderOutput(l.output)}
  <textarea id="lessonAnswer" placeholder="Berdasarkan jadual ${esc(l.title)}, ...">${esc(state.written)}</textarea>
  <div class="counter"><span id="writeCount">${state.written.trim().length}</span> aksara • minimum ${MIN_WRITTEN}</div>
  <div class="keywords">${l.keywords.map(k=>`<span class="keyword ${state.written.toLowerCase().includes(k.toLowerCase())?"hit":""}">${esc(k)}</span>`).join("")}</div>
  ${state.writtenChecked?writtenFeedback(l):""}`;
  foot=`<button class="secondary" data-action="prev-stage">← Kembali</button>${state.writtenChecked?nextButton(state.lesson===DATA.lessons.length-1?"Pergi latihan":"Lesson seterusnya",true,state.lesson===DATA.lessons.length-1?"go-practice":"next-lesson"):`<button class="primary" id="checkWritten" data-action="check-written" ${valid?"":"disabled"}>Semak jawapan</button>`}`;
 }
 screen.innerHTML=card(`<div class="eyebrow">Lesson ${state.lesson+1} daripada ${DATA.lessons.length}</div><h2>${esc(l.title)}</h2>`,body,foot);
}
function exactScan(l){return state.selected.length===l.requiredCells.length&&l.requiredCells.every(id=>state.selected.includes(id))}
function writtenFeedback(l){
 const text=state.written.toLowerCase(),hits=l.keywords.filter(k=>text.includes(k.toLowerCase())).length;
 const good=hits>=Math.ceil(l.keywords.length*.6);
 return `<div class="feedback ${good?"good":"bad"}">${good?`Jawapan mengandungi ${hits}/${l.keywords.length} elemen penting.`:`Jawapan baru mengandungi ${hits}/${l.keywords.length} elemen penting. Bandingkan dengan model.`}</div><div class="formula">${esc(l.model)}</div>`;
}
function renderPractice(){
 const q=DATA.practice[state.practice];
 if(!q){
  const pct=Math.round(state.practiceScore/DATA.practice.length*100);
  screen.innerHTML=card(`<div class="eyebrow">Latihan selesai</div><h2>Skor ${pct}%</h2>`,`<div class="hero"><div class="progress"><span style="width:${pct}%"></span></div><p>${state.practiceScore}/${DATA.practice.length} jawapan betul.</p></div>`,`<button class="secondary" data-action="reset-practice">Ulang</button><button class="primary" data-action="start-exam">Exam Mode →</button>`);return;
 }
 const answered=state.practiceChoice!==null;
 screen.innerHTML=card(`<div class="eyebrow">Latihan ${state.practice+1}/${DATA.practice.length}</div><h2>${esc(q.title)}</h2>`,
 `<div class="progress"><span style="width:${state.practice/DATA.practice.length*100}%"></span></div><div class="prompt"><strong>${esc(q.prompt)}</strong></div>
 <div class="options">${q.options.map((o,i)=>`<button class="option ${answered&&i===q.answer?"correct":""} ${answered&&i===state.practiceChoice&&i!==q.answer?"wrong":""}" data-action="practice-answer" data-index="${i}" ${answered?"disabled":""}>${esc(o)}</button>`).join("")}</div>
 ${answered?`<div class="feedback ${state.practiceChoice===q.answer?"good":"bad"}">${esc(q.optionReasons[state.practiceChoice])}</div>`:""}`,
 `<small style="color:var(--muted)">Skor ${state.practiceScore}/${state.practice}</small>${nextButton("Seterusnya",answered,"next-practice")}`);
}
function renderExam(){
 if(state.examFinished){renderExamResult();return}
 const q=DATA.exam[state.exam],answer=state.examAnswers[state.exam]||"",valid=answer.trim().length>=MIN_WRITTEN;
 screen.innerHTML=card(`<div class="eyebrow">${esc(q.set||"Exam")} • ${state.exam+1}/${DATA.exam.length}</div><h2>${esc(q.prompt)}</h2>`,
 `${renderOutput(q.override)}<textarea id="examAnswer" placeholder="Tulis jawapan penuh...">${esc(answer)}</textarea><div class="counter"><span id="examCount">${answer.trim().length}</span> aksara • minimum ${MIN_WRITTEN}. Tiada Next jika kosong.</div>`,
 `<button class="secondary" data-action="prev-exam" ${state.exam===0?"disabled":""}>← Sebelum</button><button class="primary" id="examNext" data-action="${state.exam===DATA.exam.length-1?"finish-exam":"next-exam"}" ${valid?"":"disabled"}>${state.exam===DATA.exam.length-1?"Tamat & semak":"Simpan & seterusnya →"}</button>`);
}
function renderExamResult(){
 let hit=0,total=0;
 const details=DATA.exam.map((q,i)=>{const t=(state.examAnswers[i]||"").toLowerCase(),h=q.keywords.filter(k=>t.includes(k.toLowerCase())).length;hit+=h;total+=q.keywords.length;return `<details><summary>Soalan ${i+1}: ${h}/${q.keywords.length} elemen</summary><div class="formula">${esc(q.model)}</div></details>`}).join("");
 const pct=Math.round(hit/total*100);
 screen.innerHTML=card(`<div class="eyebrow">Keputusan struktur</div><h2>${pct}%</h2>`,`<div class="progress"><span style="width:${pct}%"></span></div><p style="color:var(--muted)">Semakan elemen penting, bukan markah bahasa penuh.</p>${details}`,`<button class="secondary" data-action="reset-exam">Cuba semula</button><button class="primary" data-action="go-practice">Latihan</button>`);
}
function render(){
 document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("active",b.dataset.route===state.route));
 if(state.route==="home")renderHome();else if(state.route==="learn")renderLearn();else if(state.route==="practice")renderPractice();else renderExam();
}
document.addEventListener("click",e=>{
 const route=e.target.closest("[data-route]");if(route){setRoute(route.dataset.route);return}
 const cell=e.target.closest("[data-cell]");
 if(cell&&state.route==="learn"&&state.stage===1&&!state.evaluated){
  const id=cell.dataset.cell,i=state.selected.indexOf(id);if(i>=0)state.selected.splice(i,1);else state.selected.push(id);save();render();return;
 }
 const b=e.target.closest("[data-action]");if(!b||b.disabled)return;
 const a=b.dataset.action;
 if(a==="start-learn"){state.route="learn";state.lesson=0;resetStage()}
 else if(a==="resume-learn"){state.route="learn"}
 else if(a==="start-exam"){state.route="exam";state.exam=0;state.examFinished=false}
 else if(a==="go-practice"){state.route="practice"}
 else if(a==="reset-all"){state=clone(DEFAULT)}
 else if(a==="identify"){state.choice=Number(b.dataset.index)}
 else if(a==="opening"){state.choice=Number(b.dataset.index)}
 else if(a==="check-scan"){state.evaluated=true}
 else if(a==="next-stage"){state.stage++;state.choice=null;state.selected=[];state.evaluated=false;state.written="";state.writtenChecked=false}
 else if(a==="prev-stage"){state.stage=Math.max(0,state.stage-1);state.choice=null;state.selected=[];state.evaluated=false;state.writtenChecked=false}
 else if(a==="prev-lesson"){if(state.lesson===0)state.route="home";else{state.lesson--;resetStage()}}
 else if(a==="check-written"){if(state.written.trim().length>=MIN_WRITTEN)state.writtenChecked=true}
 else if(a==="next-lesson"){state.lesson++;resetStage()}
 else if(a==="practice-answer"){state.practiceChoice=Number(b.dataset.index);if(state.practiceChoice===DATA.practice[state.practice].answer)state.practiceScore++}
 else if(a==="next-practice"){state.practice++;state.practiceChoice=null}
 else if(a==="reset-practice"){state.practice=0;state.practiceScore=0;state.practiceChoice=null}
 else if(a==="prev-exam"){state.exam=Math.max(0,state.exam-1)}
 else if(a==="next-exam"){if((state.examAnswers[state.exam]||"").trim().length>=MIN_WRITTEN)state.exam++}
 else if(a==="finish-exam"){if((state.examAnswers[state.exam]||"").trim().length>=MIN_WRITTEN)state.examFinished=true}
 else if(a==="reset-exam"){state.exam=0;state.examAnswers=Array(DATA.exam.length).fill("");state.examFinished=false}
 save();render();
});
document.addEventListener("input",e=>{
 if(e.target.id==="lessonAnswer"){
  state.written=e.target.value;save();
  const count=document.getElementById("writeCount");if(count)count.textContent=state.written.trim().length;
  const btn=document.getElementById("checkWritten");if(btn)btn.disabled=state.written.trim().length<MIN_WRITTEN;
  document.querySelectorAll(".keyword").forEach(k=>k.classList.toggle("hit",state.written.toLowerCase().includes(k.textContent.toLowerCase())));
 }
 if(e.target.id==="examAnswer"){
  state.examAnswers[state.exam]=e.target.value;save();
  const count=document.getElementById("examCount");if(count)count.textContent=e.target.value.trim().length;
  const btn=document.getElementById("examNext");if(btn)btn.disabled=e.target.value.trim().length<MIN_WRITTEN;
 }
});
document.addEventListener("change",e=>{
 if(e.target.id==="lessonPicker"){state.lesson=Number(e.target.value);resetStage();save();render()}
});

const TABLE_THEME_LABELS={dim:"Table: Dim",cool:"Table: Cool",dark:"Table: Dark"};
function applyTableTheme(theme){
  const valid=["dim","cool","dark"].includes(theme)?theme:"dim";
  document.body.dataset.tableTheme=valid;
  const button=document.getElementById("tableThemeButton");
  if(button)button.textContent=TABLE_THEME_LABELS[valid];
  try{localStorage.setItem("spss-table-theme",valid)}catch(e){}
}
function cycleTableTheme(){
  const current=document.body.dataset.tableTheme||"dim";
  const next=current==="dim"?"cool":current==="cool"?"dark":"dim";
  applyTableTheme(next);
}
document.getElementById("tableThemeButton").addEventListener("click",cycleTableTheme);
let initialTableTheme="dim";
try{initialTableTheme=localStorage.getItem("spss-table-theme")||"dim"}catch(e){}
applyTableTheme(initialTableTheme);
render();
</script>
</body></html>
